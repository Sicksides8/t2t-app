# Sitio Netlify separado del web-crm (mismo repo, branch main).
#
# En Netlify UI:
# - Base directory: vacío (raíz del repo)
# - Package directory: apps/waitlist-web
# - Publish directory: vacío (lo define @netlify/plugin-nextjs)
#
# Netlify ejecuta el build desde la raíz del monorepo; no usar "cd ../..".

[build]
  command = "npm ci && npm run waitlist:build"

[build.environment]
  NODE_VERSION = "20"
  WAITLIST_SITE_URL = "https://t2tacademy.online"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Canonical: sin www (como entrás hoy)
[[redirects]]
  from = "https://www.t2tacademy.online/*"
  to = "https://t2tacademy.online/:splat"
  status = 301
  force = true
